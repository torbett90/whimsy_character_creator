name: Whimsy CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# CRITICAL: Grant the runner permission to push commits back to the repository
permissions:
  contents: write

jobs:
  validate-and-build:
    name: Flutter Analyze & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dart Dependencies
        run: flutter pub get

      # 1. Format all code natively (No exit flag, so it just modifies the files in the runner)
      - name: Auto-Format Code
        run: dart format .

      # 2. Automatically commit the modified files back to the repository
      - name: Commit Formatting Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated pipeline code formatting"

      # 3. Generate Isar/Riverpod files
      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      # 4. Fail the build ONLY on actual code quality/linting regressions
      - name: Analyze Code
        run: flutter analyze --fatal-infos --fatal-warnings

      # 5. Execute Pure Logic and DB tests
      - name: Run Unit Tests
        run: flutter test

      # 6. Compile release binary only if all quality gates pass
      - name: Build Linux Artifact
        run: flutter build linux --release