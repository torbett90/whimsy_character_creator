name: Whimsy CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  validate-and-build:
    name: Flutter Analyze & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Required C++ toolchain and GTK headers for Linux Desktop builds
      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Caches the Flutter SDK to speed up runner execution

      - name: Install Dart Dependencies
        run: flutter pub get

      # Critical: Isar and Riverpod require the generated .g.dart files. 
      # Since these shouldn't be committed to source control, they must be generated in the pipeline.
      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Enforces strict Dart formatting
      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      # Fails the build on any linting regressions, enforcing type safety
      - name: Analyze Code
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Build Web Artifact
        run: flutter build web --release

      - name: Build Linux Artifact
        run: flutter build linux --release